<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Floor Plan - Final Architectural Render</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Segoe UI', sans-serif; }
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            color: white; background: rgba(20, 20, 20, 0.9); 
            padding: 25px; border-radius: 12px; border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
            min-width: 250px;
        }
        h2 { margin: 0 0 15px 0; font-size: 16px; color: #00aaff; text-transform: uppercase; letter-spacing: 1px; }
        .toggle-item { display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; font-size: 14px; }
        .toggle-item input { margin-right: 12px; accent-color: #00aaff; width: 20px; height: 20px; cursor: pointer; }
        #status { font-size: 11px; opacity: 0.8; margin-top: 15px; color: #00ff00; font-family: monospace; }
        
        #loading { 
            position: fixed; inset: 0; background: #050505; 
            display: flex; align-items: center; justify-content: center; 
            flex-direction: column; gap: 15px; z-index: 999; 
        }
        .spinner { 
            width: 50px; height: 50px; border: 4px solid #222; 
            border-top-color: #00aaff; border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p style="color:white; font-family: sans-serif;">Reconstructing 3D Architecture...</p>
    </div>

    <div id="ui">
        <h2 id="project-title">Floor Plan Extraction</h2>
        <div class="toggle-item">
            <input type="checkbox" id="wall-toggle" checked> 
            <span>Walls (Solid White)</span>
        </div>
        <div class="toggle-item">
            <input type="checkbox" id="window-toggle" checked> 
            <span>Windows (Translucent Blue)</span>
        </div>
        <div id="status">Waiting for API...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ─── Settings ──────────────────────────────────────────────────────────
        const SCALE          = 0.6;    
        const WALL_HEIGHT    = 40;     
        const WALL_THICKNESS = 2.0;
        const WIN_THICKNESS  = 2.6; // Slightly thicker than wall to prevent Z-fighting

        // ─── Scene Setup ───────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(500, 600, 700);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(300, 1000, 300);
        sun.castShadow = true;
        scene.add(sun);

        // Grid for reference
        const grid = new THREE.GridHelper(2000, 50, 0x222222, 0x111111);
        scene.add(grid);

        // Layer Groups
        const wallsGroup = new THREE.Group();
        const windowsGroup = new THREE.Group();
        scene.add(wallsGroup);
        scene.add(windowsGroup);

        // ─── Generic Box Helper ────────────────────────────────────────────────
        const createBox = (p1, p2, h, thickness, yOff, color, opacity, priority, target) => {
            const x1 = p1.x * SCALE, z1 = p1.y * SCALE;
            const x2 = p2.x * SCALE, z2 = p2.y * SCALE;
            
            const dx = x2 - x1, dz = z2 - z1;
            const length = Math.sqrt(dx * dx + dz * dz);
            if (length < 0.1) return;
            const angle = Math.atan2(dz, dx);

            const geo = new THREE.BoxGeometry(length, h, thickness);
            const mat = new THREE.MeshStandardMaterial({ 
                color: color,
                transparent: opacity < 1,
                opacity: opacity,
                roughness: 0.4,
                polygonOffset: priority > 0,
                polygonOffsetFactor: -priority,
                polygonOffsetUnits: -priority
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x1 + dx/2, yOff + h/2, z1 + dz/2);
            mesh.rotation.y = -angle;
            mesh.renderOrder = priority;
            
            target.add(mesh);
            return mesh;
        };

        // ─── Main Build Scene ──────────────────────────────────────────────────
        const buildScene = (jsonResponse) => {
            wallsGroup.clear();
            windowsGroup.clear();

            const data = jsonResponse.data;
            const windows = jsonResponse.windows;
            const gates=jsonResponse.gates;

            // 1. Set Project Name
            document.getElementById('project-title').textContent = data.project_info.name;

            // 2. Render Walls
            data.walls.forEach(wall => {
                createBox(wall.start, wall.end, WALL_HEIGHT, WALL_THICKNESS, 0, 0xffffff, 1, 0, wallsGroup);
            });

            // 3. Render Windows (with Glass, Sill, and Header)
            if (windows && windows.length > 0) {
                windows.forEach(win => {
                    // Window Sill (Bottom White part)
                    createBox(win.start, win.end, WALL_HEIGHT * 0.25, WIN_THICKNESS, 0, 0xdddddd, 1, 2, windowsGroup);
                    
                    // Window Header (Top White part)
                    createBox(win.start, win.end, WALL_HEIGHT * 0.15, WIN_THICKNESS, WALL_HEIGHT * 0.85, 0xdddddd, 1, 2, windowsGroup);
                    
                    // Glass (Blue Translucent center)
                    const glass = createBox(win.start, win.end, WALL_HEIGHT * 0.5, WIN_THICKNESS * 0.5, WALL_HEIGHT * 0.3, 0x00aaff, 0.6, 10, windowsGroup);
                    if (glass) {
                        glass.material.emissive = new THREE.Color(0x0044ff);
                        glass.material.emissiveIntensity = 0.4;
                    }
                });
            }

            // ─── Render Gates (Doors) ────────────────────────────────────────────────────
if (jsonResponse.gates && jsonResponse.gates.length > 0) {
    jsonResponse.gates.forEach(gate => {
        // 1. Map Coordinates (JSON Start = Hinge, End = Leaf Tip)
        const x1 = gate.start.x * SCALE;
        const z1 = gate.start.y * SCALE;
        const x2 = gate.end.x * SCALE;
        const z2 = gate.end.y * SCALE;

        // 2. Calculate Geometry
        const dx = x2 - x1;
        const dz = z2 - z1;
        const doorWidth = Math.sqrt(dx * dx + dz * dz);
        const wallAngle = Math.atan2(dz, dx); // The angle the wall is facing

        // 3. Create Pivot Group (The Hinge Point)
        // This group sits exactly at the wall connection point
        const hingePivot = new THREE.Group();
        hingePivot.position.set(x1, 0, z1);
        
        // 4. Create the Door Leaf (The wooden part)
        const doorGeo = new THREE.BoxGeometry(doorWidth, WALL_HEIGHT * 0.9, 1.2);
        const doorMat = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513, // Wood Brown
            roughness: 0.7,
            metalness: 0.1
        });
        const doorMesh = new THREE.Mesh(doorGeo, doorMat);

        // IMPORTANT: Move the mesh so its LEFT EDGE is at the pivot center
        doorMesh.position.set(doorWidth / 2, (WALL_HEIGHT * 0.9) / 2, 0);
        hingePivot.add(doorMesh);

        // 5. Rotate the door
        // -wallAngle aligns it with the wall. 
        // + 0.7 adds a ~40 degree "swing" to make it look open.
        hingePivot.rotation.y = -wallAngle + 0.7;

        // 6. Add to specific layer group (for toggles)
        // If you don't have a gatesGroup, use scene.add or windowsGroup
        if (typeof gatesGroup !== 'undefined') {
            gatesGroup.add(hingePivot);
        } else {
            scene.add(hingePivot);
        }
    });
}
            // 4. Update UI Status
            document.getElementById('status').textContent = `RENDERED: ${data.walls.length} Walls | ${windows ? windows.length : 0} Windows`;

            // 5. Center Camera Orbit on the Plan
            const cx = (data.project_info.image_size.width * SCALE) / 2;
            const cz = (data.project_info.image_size.height * SCALE) / 2;
            controls.target.set(cx, 0, cz);
        };

        // ─── UI Event Listeners ────────────────────────────────────────────────
        document.getElementById('wall-toggle').addEventListener('change', (e) => {
            wallsGroup.visible = e.target.checked;
        });

        document.getElementById('window-toggle').addEventListener('change', (e) => {
            windowsGroup.visible = e.target.checked;
        });

        // ─── API Initialization ────────────────────────────────────────────────
        async function init() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/data');
                if (!response.ok) throw new Error("HTTP Error: " + response.status);
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    console.log("Data Received:", result);
                    buildScene(result);
                } else {
                    document.getElementById('status').textContent = "API Error: " + (result.message || "Unknown");
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('status').textContent = "Connection Error: Check Backend";
                document.getElementById('status').style.color = "red";
            } finally {
                // Hide loading overlay
                document.getElementById('loading').style.display = 'none';
                animate();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
